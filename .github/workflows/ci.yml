name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fde
          POSTGRES_PASSWORD: fde_password
          POSTGRES_DB: ai_ticket_assistant
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fde -d ai_ticket_assistant"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
        env:
          DATABASE_URL: postgresql://fde:fde_password@localhost:5432/ai_ticket_assistant
          REDIS_URL: redis://localhost:6379
          REDIS_ENABLED: "true"
          JWT_SECRET: ci-test-jwt-secret
          JWT_EXPIRES_IN: 1d
          REFRESH_TOKEN_EXPIRES_IN_DAYS: 7

  docker-build:
    name: Docker Build (smoke test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f apps/backend/Dockerfile -t fde-backend:ci .

      - name: Build frontend image
        run: docker build -f apps/frontend/Dockerfile -t fde-frontend:ci .
