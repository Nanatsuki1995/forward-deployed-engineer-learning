services:
  postgres:
    image: postgres:16-alpine
    container_name: fde-learning-postgres
    environment:
      POSTGRES_USER: fde
      POSTGRES_PASSWORD: fde_password
      POSTGRES_DB: ai_ticket_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fde -d ai_ticket_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fde-learning-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
